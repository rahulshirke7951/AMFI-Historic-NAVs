name: Historic Ingestion

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas openpyxl requests

      - name: Run historic import
        run: |
          python scripts/import_historic.py

      - name: List files (debug)
        run: |
          ls -R

      - name: Commit DB to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/historic.db
          git commit -m "Update historic.db" || echo "No changes to commit"
          git push
